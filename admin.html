<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaBiz CMS - Admin Area Terkunci</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { mega: '#F58220' } } }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 min-h-screen font-sans antialiased text-gray-800">

    <div id="login-screen" class="fixed inset-0 bg-gray-900 bg-opacity-95 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-orange-100 text-mega rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Area Terbatas</h2>
            <p class="text-sm text-gray-500 mb-6">Masukkan kata sandi administrator.</p>
            
            <input type="password" id="input-password" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-center tracking-widest focus:border-mega focus:ring-2 focus:ring-orange-100 outline-none mb-4" placeholder="••••••••">
            <button onclick="cekPassword()" class="w-full bg-mega hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">Buka Kunci Panel</button>
            <p id="pesan-login" class="text-red-500 text-xs font-bold mt-3 hidden">❌ Kata sandi salah!</p>
        </div>
    </div>

    <div id="admin-dashboard" class="max-w-5xl mx-auto px-4 py-10 hidden">
        <div class="flex items-center justify-between mb-8 border-b pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight"><span class="text-mega">MegaBiz</span> CMS Panel</h1>
                <p class="text-sm text-gray-500 mt-1">Sistem Pengelolaan Dokumen Panduan Intern & Ekstern</p>
            </div>
            <div class="flex gap-3">
                <a href="index.html" class="px-4 py-2 text-sm font-semibold text-gray-600 bg-white border border-gray-200 rounded-lg hover:text-mega transition-all">
                    ← Website Utama
                </a>
                <button onclick="logout()" class="px-4 py-2 text-sm font-semibold text-red-600 bg-red-50 border border-red-100 rounded-lg hover:bg-red-100 transition-all">
                    Logout
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100 sticky top-6">
                    <h2 id="judul-form" class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-mega rounded-full"></span> Tambah Modul baru
                    </h2>
                    
                    <form id="form-upload" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Judul Modul</label>
                            <input type="text" id="input-judul" required class="w-full border border-gray-200 rounded-xl px-4 py-2.5 outline-none text-sm focus:border-mega transition-all">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Kategori Utama</label>
                            <select id="input-kategori" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 bg-white outline-none text-sm focus:border-mega transition-all">
                                <option value="My Task">My Task</option>
                                <option value="Account Information">Account Information</option>
                                <option value="Transfer Management">Transfer Management</option>
                                <option value="Tax Payment">Tax Payment</option>
                                <option value="Payment">Payment</option>
                                <option value="Purchase">Purchase</option>
                                <option value="Time Deposit">Time Deposit</option>
                                <option value="Liquidity Management">Liquidity Management</option>
                                <option value="Forex Management">Forex Management</option>
                                <option value="Transaction Report">Transaction Report</option>
                                <option value="Utilities – Report">Utilities – Report</option>
                                <option value="Account & User Management">Account & User Management</option>
                                <option value="Setting">Setting</option>
                                <option value="Report">Report</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Deskripsi Singkat</label>
                            <textarea id="input-deskripsi" required rows="3" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 outline-none text-sm focus:border-mega transition-all"></textarea>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1">Berkas Dokumen (PDF)</label>
                            <div class="border-2 border-dashed border-orange-200 bg-orange-50/40 p-4 rounded-xl text-center relative cursor-pointer">
                                <input type="file" id="input-file-pdf" accept="application/pdf" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                                <svg class="w-6 h-6 text-orange-400 mx-auto mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <span id="file-label" class="text-[11px] font-medium text-gray-600 block truncate">Pilih berkas PDF baru...</span>
                            </div>
                            <p id="info-edit-pdf" class="text-[10px] text-gray-400 mt-1 hidden">*Kosongkan jika tidak ingin mengganti file PDF lama.</p>
                        </div>

                        <div class="flex gap-2 mt-4">
                            <button type="submit" id="btn-submit" class="w-full bg-mega hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all shadow-md">
                                Simpan Data
                            </button>
                            <button type="button" id="btn-batal-edit" onclick="batalEdit()" class="hidden w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl transition-all shadow-md">
                                Batal
                            </button>
                        </div>
                        
                        <p id="status-pesan" class="text-center font-bold text-xs p-3 rounded-xl hidden mt-3"></p>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-6">
                    <h2 class="text-xl font-bold text-gray-900 mb-4 flex items-center gap-2">
                        <span class="w-2 h-6 bg-gray-400 rounded-full"></span> Data Modul Aktif
                    </h2>
                    <div class="overflow-x-auto rounded-xl border border-gray-100">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 text-gray-500 text-xs font-bold uppercase tracking-wider border-b">
                                    <th class="p-4">Modul</th>
                                    <th class="p-4">Kategori</th>
                                    <th class="p-4 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabel-admin-body" class="text-sm divide-y divide-gray-100">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =========================================================================
        // KONFIGURASI SUPABASE (PASTIKAN MENGISI URL & KEY ANDA)
        // =========================================================================
        const SUPABASE_URL = 'TARUH_URL_SUPABASE_DISINI'; 
        const SUPABASE_KEY = 'TARUH_API_KEY_DISINI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // KATA SANDI PANEL ADMIN
        const PASSWORD_ADMIN = "Bankmega1"; 

        // Variabel Global untuk Mode Edit
        let dataModulLokal = [];
        let modeEdit = false;
        let idEditAktif = null;
        let linkPdfLama = null;

        // =========================================================================
        // LOGIKA LOGIN
        // =========================================================================
        // Cek apakah sudah login sebelumnya di tab ini
        if (sessionStorage.getItem("statusAdmin") === "sukses") {
            bukaPanel();
        }

        function cekPassword() {
            const input = document.getElementById('input-password').value;
            if (input === PASSWORD_ADMIN) {
                sessionStorage.setItem("statusAdmin", "sukses"); // Simpan sesi sementara
                bukaPanel();
            } else {
                document.getElementById('pesan-login').classList.remove('hidden');
            }
        }

        function bukaPanel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-dashboard').classList.remove('hidden');
            muatTabelAdmin(); // Tarik data saat login sukses
        }

        function logout() {
            sessionStorage.removeItem("statusAdmin");
            location.reload(); // Refresh halaman untuk mengunci kembali
        }

        // =========================================================================
        // LOGIKA TABEL & EDIT
        // =========================================================================
        document.getElementById('input-file-pdf').addEventListener('change', function(e) {
            const fileName = e.target.files[0] ? e.target.files[0].name : "Pilih berkas PDF baru...";
            document.getElementById('file-label').innerText = fileName;
        });

        async function muatTabelAdmin() {
            const tbody = document.getElementById('tabel-admin-body');
            tbody.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-400 animate-pulse">⏳ Memuat data...</td></tr>`;
            try {
                const { data, error } = await supabaseClient.from('modul_tutorial').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                
                dataModulLokal = data; // Simpan data ke memori lokal untuk fitur edit
                tbody.innerHTML = data.length === 0 ? `<tr><td colspan="3" class="p-6 text-center text-gray-400">Belum ada modul.</td></tr>` : '';
                
                data.forEach(item => {
                    const row = `
                        <tr class="hover:bg-gray-50/80 transition-colors">
                            <td class="p-4">
                                <div class="font-bold text-gray-800">${item.judul}</div>
                                <div class="text-xs text-gray-400 max-w-xs truncate mt-0.5">${item.deskripsi}</div>
                            </td>
                            <td class="p-4"><span class="text-[10px] font-bold uppercase bg-orange-50 text-mega border border-orange-100 px-2 py-1 rounded-md">${item.kategori}</span></td>
                            <td class="p-4 text-center space-x-1 whitespace-nowrap">
                                <button onclick="siapkanEdit('${item.id}')" class="text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors">Edit</button>
                                <button onclick="hapusModul('${item.id}')" class="text-xs font-bold text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors">Hapus</button>
                            </td>
                        </tr>`;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            } catch (err) { tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-red-500 text-center font-bold">Gagal memuat database!</td></tr>`; }
        }

        // Fungsi Trigger Mode Edit
        window.siapkanEdit = function(id) {
            const modul = dataModulLokal.find(m => m.id === id);
            if (!modul) return;

            // Masukkan data ke form
            document.getElementById('input-judul').value = modul.judul;
            document.getElementById('input-kategori').value = modul.kategori;
            document.getElementById('input-deskripsi').value = modul.deskripsi;
            
            // Ubah UI menjadi Mode Edit
            modeEdit = true;
            idEditAktif = modul.id;
            linkPdfLama = modul.link_pdf; // Simpan memori link lama

            document.getElementById('judul-form').innerHTML = `<span class="w-2 h-6 bg-blue-500 rounded-full"></span> Edit Modul`;
            document.getElementById('btn-submit').innerText = "Update Modul";
            document.getElementById('btn-submit').classList.replace('bg-mega', 'bg-blue-500');
            document.getElementById('btn-submit').classList.replace('hover:bg-orange-600', 'hover:bg-blue-600');
            document.getElementById('btn-batal-edit').classList.remove('hidden');
            
            document.getElementById('input-file-pdf').required = false; // File tidak wajib diisi saat edit
            document.getElementById('info-edit-pdf').classList.remove('hidden');
            document.getElementById('file-label').innerText = "Biarkan kosong jika PDF tidak diganti";
            
            window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll ke atas
        }

        // Fungsi Membatalkan Mode Edit
        window.batalEdit = function() {
            modeEdit = false;
            idEditAktif = null;
            linkPdfLama = null;

            document.getElementById('form-upload').reset();
            document.getElementById('judul-form').innerHTML = `<span class="w-2 h-6 bg-mega rounded-full"></span> Tambah Modul baru`;
            document.getElementById('btn-submit').innerText = "Simpan ke Database";
            document.getElementById('btn-submit').classList.replace('bg-blue-500', 'bg-mega');
            document.getElementById('btn-submit').classList.replace('hover:bg-blue-600', 'hover:bg-orange-600');
            document.getElementById('btn-batal-edit').classList.add('hidden');
            
            document.getElementById('input-file-pdf').required = true; // Wajib isi file lagi
            document.getElementById('info-edit-pdf').classList.add('hidden');
            document.getElementById('file-label').innerText = "Pilih berkas PDF dari komputer";
        }

        // =========================================================================
        // PROSES FORM (TAMBAH & UPDATE)
        // =========================================================================
        document.getElementById('form-upload').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit');
            const statusPesan = document.getElementById('status-pesan');
            
            btnSubmit.innerText = "⏳ Sedang Memproses...";
            btnSubmit.disabled = true;
            btnSubmit.classList.add('opacity-50');
            statusPesan.className = "text-center font-bold text-xs p-3 rounded-xl bg-blue-50 text-blue-600 block mt-3 animate-pulse";
            statusPesan.innerText = "Menyinkronkan dengan server...";

            try {
                const judul = document.getElementById('input-judul').value;
                const kategori = document.getElementById('input-kategori').value;
                const deskripsi = document.getElementById('input-deskripsi').value;
                const filePdf = document.getElementById('input-file-pdf').files[0];
                
                let linkFinalPdf = linkPdfLama; // Default gunakan link lama (untuk mode edit)

                // Jika user mengunggah file PDF baru (berlaku untuk Tambah Baru ATAU Edit ganti PDF)
                if (filePdf) {
                    const namaFileUnik = Date.now() + "_" + filePdf.name.replace(/\s+/g, '_');
                    const { error: errorUpload } = await supabaseClient.storage.from('modul-pdf').upload('berkas/' + namaFileUnik, filePdf);
                    if (errorUpload) throw errorUpload;

                    const { data: publicUrlData } = supabaseClient.storage.from('modul-pdf').getPublicUrl('berkas/' + namaFileUnik);
                    linkFinalPdf = publicUrlData.publicUrl;
                }

                if (modeEdit) {
                    // JALANKAN PROSES UPDATE
                    const { error: errorUpdate } = await supabaseClient.from('modul_tutorial')
                        .update({ judul: judul, deskripsi: deskripsi, kategori: kategori, link_pdf: linkFinalPdf })
                        .eq('id', idEditAktif);
                    if (errorUpdate) throw errorUpdate;
                    statusPesan.innerText = "✅ Modul berhasil di-update!";
                } else {
                    // JALANKAN PROSES INSERT (TAMBAH BARU)
                    const { error: errorInsert } = await supabaseClient.from('modul_tutorial')
                        .insert([{ judul: judul, deskripsi: deskripsi, kategori: kategori, link_pdf: linkFinalPdf }]);
                    if (errorInsert) throw errorInsert;
                    statusPesan.innerText = "✅ Modul baru berhasil ditambahkan!";
                }

                statusPesan.className = "text-center font-bold text-xs p-3 rounded-xl bg-green-50 text-green-600 block mt-3";
                batalEdit(); // Reset form dan kembali ke mode tambah
                muatTabelAdmin(); // Segarkan tabel

            } catch (error) {
                statusPesan.className = "text-center font-bold text-xs p-3 rounded-xl bg-red-50 text-red-600 block mt-3";
                statusPesan.innerText = "❌ Gagal: " + error.message;
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.classList.remove('opacity-50');
                if(!modeEdit) btnSubmit.innerText = "Simpan ke Database";
            }
        });

        // =========================================================================
        // PROSES HAPUS
        // =========================================================================
        window.hapusModul = async function(id) {
            if (confirm("🚨 PERINGATAN: Apakah Anda yakin ingin menghapus modul ini secara permanen? Modul akan langsung hilang dari website utama.")) {
                try {
                    const { error } = await supabaseClient.from('modul_tutorial').delete().eq('id', id);
                    if (error) throw error;
                    muatTabelAdmin();
                } catch (err) { alert("Gagal menghapus: " + err.message); }
            }
        }
    </script>
</body>
</html>
