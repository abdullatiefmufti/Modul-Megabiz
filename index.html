<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaBiz Internet Banking - Download Center Panduan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mega: '#F58220', // Warna Oranye Bank Mega
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <header class="bg-white shadow-sm border-b-4 border-mega">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-gray-700">
                <span class="text-mega">MegaBiz</span> Download Center
            </h1>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="mb-8 relative max-w-2xl mx-auto">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Cari panduan transfer, rekening, token..." 
                class="w-full px-5 py-3 rounded-full border border-gray-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-mega focus:border-transparent text-gray-700"
            >
        </div>

        <div id="tutorialContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
