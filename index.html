<!DOCTYPE html>
<html lang="id">
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaBiz Internet Banking - Download Center Panduan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { mega: '#F58220' } } }
        }
    </script>
</head>
<body class="bg-gradient-to-tr from-gray-50 to-slate-100 text-gray-800 min-h-screen font-sans antialiased">

    <header class="bg-white/80 backdrop-blur-md shadow-sm border-b-4 border-mega sticky top-0 z-50 transition-all">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-black text-gray-800 tracking-tight">
                <span class="text-mega">MegaBiz</span> Download Center
            </h1>
            <a href="admin.html" class="text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-mega transition-colors">
                🔐 Area Admin
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="bg-white rounded-2xl p-6 shadow-xl border border-gray-100 mb-10 max-w-3xl mx-auto text-center">
            <h2 class="text-xl font-extrabold text-gray-900 mb-2">Pusat Unduhan Dokumen SOP & Panduan</h2>
            <p class="text-sm text-gray-500 mb-6">Temukan panduan transaksi terlengkap untuk mempermudah alur kerja Anda.</p>
            
            <div class="relative">
                <input type="text" id="searchInput" placeholder="Cari kata kunci: transfer, rekening, token..." class="w-full pl-12 pr-6 py-3.5 rounded-xl border border-gray-200 shadow-inner focus:outline-none focus:ring-2 focus:ring-orange-100 focus:border-mega text-gray-700 font-medium transition-all">
                <svg class="w-5 h-5 text-gray-400 absolute left-4 top-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <div class="flex flex-wrap gap-2 justify-center mt-4 border-t pt-4 border-gray-50" id="filter-tabs">
                <button onclick="filterKategori('Semua')" class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg bg-mega text-white transition-all shadow-sm">Semua Fitur</button>
                <button onclick="filterKategori('Transfer Management')" class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg bg-gray-100 text-gray-600 hover:bg-orange-50 hover:text-mega transition-all">Transfer</button>
                <button onclick="filterKategori('Account Information')" class="tab-btn px-3 py-1.5 text-xs font-bold rounded-lg bg-gray-100 text-gray-600 hover:bg-orange-50 hover:text-mega transition-all">Rekening</button>
            </div>
        </div>

        <div id="tutorialContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 transition-all duration-300">
            <p class="col-span-full text-center text-gray-400 animate-pulse py-20 font-medium">⏳ Menghubungkan ke pangkalan data cloud...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
